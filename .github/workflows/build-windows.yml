name: Build Windows Installer

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Syntax check
        shell: pwsh
        run: |
          $files = @(
            "src/core/module-registry.js",
            "src/app.js",
            "src/adapters/auth-tenant-adapter.js",
            "src/adapters/employee-adapter.js",
            "src/adapters/export-print-adapter.js",
            "src/modules/invoices/invoices.module.js",
            "src/modules/fleet/fleet.module.js",
            "src/modules/attendance/attendance.module.js",
            "src/modules/utilities/utilities.module.js",
            "src/modules/settings/settings.module.js",
            "electron/main.js",
            "electron/preload.js",
            "scripts/write-build-config.js"
          )
          foreach ($file in $files) {
            node --check $file
          }

      - name: Build release installer
        run: npm run build:win

      - name: Collect release installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Copy-Item "dist/HR Admin Platform Setup $env:APP_VERSION.exe" "artifacts/HR.Admin.Platform.Setup.$env:APP_VERSION.exe"

      - name: Build demo installer
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        run: npm run build:win:demo

      - name: Collect demo installer
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          Copy-Item "dist/HR Admin Platform Setup $env:APP_VERSION.exe" "artifacts/HR.Admin.Platform.Setup.$env:APP_VERSION.Demo.exe"

      - name: Generate checksums
        shell: pwsh
        run: |
          Get-ChildItem artifacts -Filter "*.exe" | ForEach-Object {
            $hash = Get-FileHash $_.FullName -Algorithm SHA256
            "$($hash.Hash.ToLower())  $($_.Name)"
          } | Set-Content "artifacts/CHECKSUMS.txt"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hr-admin-platform-windows
          path: artifacts/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body_path: RELEASE_NOTES.md
